name: CI (backend)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    # Локальный Postgres для интеграционных тестов (быстрый, без внешней БД)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: polish_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      # Имя базы содержит polish_test → проходит guard в tests/setup.js
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/polish_test
      JWT_SECRET: ci_test_secret_not_for_prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm test
